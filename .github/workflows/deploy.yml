name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Build/Test
        run: |
          echo "Building the website..."
          ls -la
          echo "Build successful!"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          # This line prevents the "Host key verification failed" error
          proxy_timeout: 30s
          script: |
            cd /var/www/html
            git config --global --add safe.directory /var/www/html
            # Ensure we use the correct SSH identity for the pull
            ssh-agent bash -c 'ssh-add ~/.ssh/id_ed25519; git pull origin main'
