name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          fingerprint: ""
          script: |
            cd /var/www/html
            sudo git config --global --add safe.directory /var/www/html
            sudo git remote set-url origin https://${{ secrets.GIT_TOKEN }}@github.com/sundaskhan1/sundas-project-1.git
            sudo git pull origin main
